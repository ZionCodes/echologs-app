  <!-- Horizontal log lines — suggesting output/logs -->
  <rect x="15" y="11" width="11" height="2" rx="1" fill="#00e57a" opacity="0.9"/>
  <rect x="15" y="15" width="8" height="2" rx="1" fill="#00e57a" opacity="0.55"/>
  <rect x="15" y="19" width="10" height="2" rx="1" fill="#00e57a" opacity="0.3"/>
</svg>
