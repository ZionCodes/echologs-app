<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#080b0f"/>

  <!-- Green pulse dot — the "monitor" signal -->
